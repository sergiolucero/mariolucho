name: Radio Data Scraper

on:
  schedule:
    # Runs every 15 minutes (Minute Hour Day-of-Month Month Day-of-Week)
    - cron: '17,47 * * * *'
  workflow_dispatch: # Enables a "Run workflow" manual button in the GitHub UI

jobs:
  scrape-job:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Scraper Script
        run: python scraper.py
