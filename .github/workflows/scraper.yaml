name: Radio Data Scraper

on:
  schedule:
    - cron: '*/3 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-job:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Scraper Script
        run: python scraper.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update nowplaying.json [skip ci]"
          file_pattern: "nowplaying.json"
